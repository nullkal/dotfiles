---
- hosts: localhost
  vars:
    private_roles:
      - ssh_private

  roles:
    - packages
    - zsh
    - tmux
    - nvim
    - git
    - ssh

  pre_tasks:
    - name: Check if dotfiles-priv exists
      ansible.builtin.stat:
        path: "{{ playbook_dir }}/dotfiles-priv"
      register: dotfiles_priv_dir

  tasks:
    - name: Include private roles from dotfiles-priv when available
      ansible.builtin.include_role:
        name: "{{ item }}"
      loop: "{{ private_roles }}"
      when: dotfiles_priv_dir.stat.isdir | default(false)
